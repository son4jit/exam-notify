<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!--
  ╔══════════════════════════════════════════════╗
  ║  All site text is configured in config.yml   ║
  ║  Exam data lives in exams.json               ║
  ║  Do NOT edit this file for content changes.  ║
  ╚══════════════════════════════════════════════╝
  -->

  <!-- SITE_TITLE: pulled from config.yml → site.title -->
  <title>Exam Schedule</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ACCENT COLOR: config.yml → theme.accent */
      --accent: #c0392b;

      --bg:   #f5f2ec;
      --ink:  #1a1714;
      --line: #d4cfc8;
      --muted:#8a8278;
      --card: #fff;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.7s ease both;
    }

    /* LABEL: config.yml → site.label */
    .label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* HEADING: config.yml → site.heading + site.heading_accent */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .divider {
      width: 2.5rem;
      height: 2px;
      background: var(--accent);
      margin: 1.2rem auto 0;
    }

    .schedule {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
    }

    .exam-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-bottom: none;
      padding: 1.4rem 1.6rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
      transition: background 0.2s;
    }

    .exam-card:first-child { border-radius: 6px 6px 0 0; }
    .exam-card:last-child  { border-bottom: 1px solid var(--line); border-radius: 0 0 6px 6px; }

    .exam-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .exam-card:hover { background: #faf8f5; }
    .exam-card:hover::before { transform: scaleY(1); }

    /* Stagger animation for up to 10 cards */
    .exam-card:nth-child(1)  { animation-delay: 0.08s; }
    .exam-card:nth-child(2)  { animation-delay: 0.16s; }
    .exam-card:nth-child(3)  { animation-delay: 0.24s; }
    .exam-card:nth-child(4)  { animation-delay: 0.32s; }
    .exam-card:nth-child(5)  { animation-delay: 0.40s; }
    .exam-card:nth-child(6)  { animation-delay: 0.48s; }
    .exam-card:nth-child(7)  { animation-delay: 0.56s; }
    .exam-card:nth-child(8)  { animation-delay: 0.64s; }
    .exam-card:nth-child(9)  { animation-delay: 0.72s; }
    .exam-card:nth-child(10) { animation-delay: 0.80s; }

    .left .date {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .left .subject {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
    }

    .left .code {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .right { text-align: right; }

    .time-badge {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 0.3rem 0.65rem;
      white-space: nowrap;
    }

    .day-chip {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
      display: block;
    }

    /* FOOTER: config.yml → site.footer */
    footer {
      margin-top: 2.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      animation: fadeUp 0.7s 0.55s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .exam-card { padding: 1.1rem 1.2rem; }
      .left .subject { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <header>
    <!-- Edit label/heading in config.yml, not here -->
    <p class="label" id="site-label"></p>
    <h1 id="site-heading"></h1>
    <div class="divider"></div>
  </header>

  <div class="schedule" id="schedule"></div>

  <footer id="site-footer"></footer>

  <script>
    // ── Site config (mirrors config.yml → site block) ──────────────────────
    // To change these values, edit config.yml — then update here to match.
    const SITE = {
      label:          "4th Semester · Sessional Examinations",
      heading:        "Exam",
      heading_accent: "Schedule",
      footer:         "All the best · Study hard 🎯",
    };

    // ── Exam data (mirrors exams.json) ─────────────────────────────────────
    // To add/remove/change exams, edit exams.json — then update here to match.
    const EXAMS = [
      { subject: "DBMS", code: "Major 5",  date: "23 Apr 2026", day: "Thursday",  time: "1 – 2 PM"   },
      { subject: "MFCS", code: "Major 6",  date: "24 Apr 2026", day: "Friday",    time: "1 – 2 PM"   },
      { subject: "OS",   code: "Major 7",  date: "25 Apr 2026", day: "Saturday",  time: "1 – 2 PM"   },
      { subject: "AEC",  code: "Elective", date: "27 Apr 2026", day: "Monday",    time: "1 – 2 PM"   },
      { subject: "Math", code: "Core",     date: "29 Apr 2026", day: "Wednesday", time: "10 – 11 AM" },
    ];

    // ── Render ─────────────────────────────────────────────────────────────
    document.getElementById("site-label").textContent   = SITE.label;
    document.getElementById("site-heading").innerHTML   =
      `${SITE.heading} <span>${SITE.heading_accent}</span>`;
    document.getElementById("site-footer").textContent  = SITE.footer;

    const schedule = document.getElementById("schedule");
    EXAMS.forEach((exam) => {
      schedule.innerHTML += `
        <div class="exam-card">
          <div class="left">
            <p class="date">${exam.date}</p>
            <p class="subject">${exam.subject}</p>
            <p class="code">${exam.code}</p>
          </div>
          <div class="right">
            <span class="time-badge">${exam.time}</span>
            <span class="day-chip">${exam.day}</span>
          </div>
        </div>`;
    });
  </script>

</body>
</html>
